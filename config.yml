# Radar Forge configuration (`tracks[]` schema)
#
# This is the single runtime configuration entrypoint.
# Edit this file directly to customize tracked repositories and content sources.
# Changes take effect on the next workflow run.
#
# Current runtime support:
# - `github_group` tracks for AI CLI / skills / AI agents are supported by `src/config.ts`
# - The skills runtime can aggregate multiple skills repositories into one summary section
# - `content_group` tracks are now executed by the runtime via configurable source discovery
# - Supported discovery kinds: `sitemap`, `sitemap-index`, `sitemap-index-template`, `rss`, `atom`
# - Supported extract modes: `full-page`, `metadata-only`, `feed-first`, `feed-only`

tracks:
  - id: ai-cli
    kind: github_group
    name: AI CLI Tools
    analysis_profile: cli
    topology: symmetric
    report:
      label: digest
      title_zh: AI CLI 工具社区动态日报
      title_en: AI CLI Tools Digest
      include_in_rollups: true
    members:
      - id: claude-code
        repo: anthropics/claude-code
        name: Claude Code
      - id: codex
        repo: openai/codex
        name: OpenAI Codex
      - id: gemini-cli
        repo: google-gemini/gemini-cli
        name: Gemini CLI
      - id: copilot-cli
        repo: github/copilot-cli
        name: GitHub Copilot CLI
      - id: kimi-cli
        repo: MoonshotAI/kimi-cli
        name: Kimi Code CLI
      - id: opencode
        repo: anomalyco/opencode
        name: OpenCode
      - id: qwen-code
        repo: QwenLM/qwen-code
        name: Qwen Code

  - id: ai-skills
    kind: github_group
    name: Skills Ecosystem
    analysis_profile: skills
    topology: symmetric
    report:
      label: skills
      title_zh: Skills 生态热点
      title_en: Skills Ecosystem Highlights
      include_in_rollups: true
    members:
      - id: claude-skills
        repo: anthropics/skills
        name: Claude Code Skills

  - id: ai-agents
    kind: github_group
    name: AI Agents Ecosystem
    analysis_profile: project
    topology: primary-peer
    primary_member_id: openclaw
    report:
      label: agents
      title_zh: AI Agents 生态日报
      title_en: AI Agents Ecosystem Digest
      include_in_rollups: true
    members:
      - id: openclaw
        repo: openclaw/openclaw
        name: OpenClaw
        paginated: true
      - id: nanobot
        repo: HKUDS/nanobot
        name: NanoBot
        paginated: true
      - id: zeroclaw
        repo: zeroclaw-labs/zeroclaw
        name: Zeroclaw
      - id: picoclaw
        repo: sipeed/picoclaw
        name: PicoClaw
        paginated: true

  - id: ai-web
    kind: content_group
    name: Official AI Sites
    analysis_profile: official_content
    report:
      label: web
      title_zh: AI 官方内容追踪报告
      title_en: Official AI Content Report
      include_in_rollups: true
    sources:
      - id: anthropic
        name: Anthropic
        discovery:
          # Anthropic does not currently expose an official RSS/Atom feed.
          # This mirror is RSS-shaped and links back to original anthropic.com URLs.
          kind: rss
          url: https://raw.githubusercontent.com/0xSMW/rss-feeds/main/feeds/feed_anthropic_news.xml
        extract:
          mode: feed-only
      - id: openai
        name: OpenAI
        discovery:
          kind: rss
          url: https://openai.com/news/rss.xml
        extract:
          mode: feed-only
      - id: cloudflare-blog
        name: Cloudflare Blog
        discovery:
          kind: rss
          url: https://blog.cloudflare.com/rss/
        extract:
          mode: feed-first
